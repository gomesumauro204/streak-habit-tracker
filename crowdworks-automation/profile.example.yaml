# =========================================================
# 応募者プロフィール設定
# =========================================================
#
# このファイルをコピーして profile.yaml を作成してください。
#
# ★ ここが応募文生成の「唯一の情報源」です ★
# このファイルを編集するだけで、以後すべての応募文にすぐ反映されます。
# コード(src/以下)を触る必要は一切ありません。
#
# [必須項目]
#   name      : あなたの名前(応募文の署名に使われます)
#   strengths : 強み・実績のリスト(1つ以上)
#
# [任意項目]
#   title               : 肩書き・キャッチコピー
#   portfolio.url        : ポートフォリオURL
#   portfolio.note        : ポートフォリオの説明
#   availability.hours    : 稼働可能時間
#   availability.scope    : 対応可能な業務範囲
#   extraNotes            : その他アピールしたいこと(リスト)
#   sampleApplication      : 過去に「良い」と思った応募文サンプル
#                            (AIが文体・構成の参考にします)

name: "福原 敬介"
title: "AI活用・業務効率化ツール開発"

strengths:
  - "Web制作歴3年、React/TypeScriptでの開発経験多数"
  - "直近の実績: ○○ツールの開発(簡単な説明に差し替えてください)"

portfolio:
  url: "https://example.com/portfolio"
  note: "過去の制作実績はこちらにまとめています"

availability:
  hours: "平日夜・週末中心、週10時間程度"
  scope: "デザイン〜実装〜納品まで一貫対応"

extraNotes:
  - "レスポンスの速さ、修正対応の柔軟さが強みです"

sampleApplication: |
  はじめまして、○○と申します。
  (ここに、発注者側として「これは良い応募文だ」と思ったサンプルを貼り付けてください)
