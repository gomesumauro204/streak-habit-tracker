# =========================================================
# 応募対象判定 基準設定
# =========================================================
#
# このファイルをコピーして job-criteria.yaml を作成してください。
#
# ★ search-conditions.yaml との役割の違い ★
#   search-conditions.yaml : どのキーワードで「案件を探すか」(粗い絞り込み)
#   job-criteria.yaml      : 見つかった案件が「実際に応募すべき内容か」の判定基準
#
# search-conditions.yaml に一致しただけでは応募対象にはなりません。
# ここに書いた基準をもとに、Claudeが案件の本文まで読んだ上で
# 採用/除外を最終判定します(src/screening.ts)。
#
# -----------------------------------------------------------
# [各項目の意味]
# -----------------------------------------------------------
#   acceptKeywords : 歓迎したい案件の特徴(参考情報)
#   rejectKeywords : 避けたい案件の特徴(参考情報)
#   description    : キーワードだけでは表現しづらい判定方針の補足(自由記述、省略可)
#
# ⚠ acceptKeywords / rejectKeywords は「参考情報」であり、機械的なキーワード
#   一致だけでは判定しません。Claudeが案件本文を読み、以下のようなケースにも
#   対応できるよう設計されています。
#     - タイトルに「AI」等の語がなくても、本文の内容がツール開発案件なら採用
#     - タイトルに「AI」等の語があっても、本文の内容がライティング案件なら除外
#
# -----------------------------------------------------------
# [キーワードの増やし方]
# -----------------------------------------------------------
#   acceptKeywords / rejectKeywords それぞれのリストに行を追加・削除するだけです。
#   コードの変更は一切不要です。

acceptKeywords:
  - "業務効率化"
  - "自動化"
  - "Webツール"
  - "Webアプリ"
  - "システム開発"
  - "Python"
  - "GAS"
  - "VBA"
  - "RPA"
  - "Claude Code"
  - "ChatGPT"
  - "AI導入"
  - "業務改善"
  - "社内ツール"

rejectKeywords:
  - "データ入力"
  - "ライティング"
  - "ブログ"
  - "記事作成"
  - "テレアポ"
  - "営業代行"
  - "電話対応"
  - "アンケート"
  - "モニター"
  - "EC出品作業"
  - "単純作業"

# 判定方針の補足(自由記述)。Claudeはこの文章も判定材料にします。
description: |
  私(応募者)はAIを活用した業務効率化ツール・Webツール開発・自動化案件を
  中心に受注したいと考えています。実装や開発を伴う案件を優先的に採用してください。
  文章作成・単純作業・電話/対面での営業や対応が中心の案件は、
  たとえタイトルにAI関連の語が含まれていても除外してください。
  逆に、タイトルにAI関連の語がなくても、業務システムや社内ツールの開発・
  自動化スクリプトの作成など、実装を伴う内容であれば採用してください。
