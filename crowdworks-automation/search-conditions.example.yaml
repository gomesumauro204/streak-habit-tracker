# =========================================================
# クラウドワークス 新着案件 検索条件設定
# =========================================================
#
# このファイルをコピーして search-conditions.yaml を作成してください。
#
# -----------------------------------------------------------
# [各項目の意味]
# -----------------------------------------------------------
#   name            : 管理用の名前。レポート上に表示されます(自由に変更可)
#   searchUrl       : クラウドワークスの検索結果ページURL(下記「searchUrlの決め方」参照)
#   contractType    : 契約方式。 "fixed"(固定報酬) か "hourly"(時間単価)
#                      省略した場合は "fixed" 扱いになります
#   minBudget       : [固定報酬のみ] 最低契約金額(円)。この金額未満の案件は除外
#   minHourlyRate   : [時間単価のみ] 最低時給(円)。この時給未満の案件は除外
#                      ※ minBudget と minHourlyRate はどちらか片方だけ設定してください
#                        (fixedなのにminHourlyRateを書く、のような組み合わせはエラーになります)
#   newOnly         : true にすると、一覧で「新着」表示がある案件のみ対象(既定false)
#   openOnly        : true にすると、募集終了・受付終了の案件を除外(既定false)
#
#   ※ excludeKeywords(除外キーワード)はこの段階では使いません。
#     検索条件はできるだけ広く案件を拾うことを優先し、実際に応募すべきかの
#     絞り込みは job-criteria.yaml の基準にもとづき Claude が本文まで読んで
#     判定します(詳細はプロジェクトの README「応募対象判定」を参照)。
#
# -----------------------------------------------------------
# [searchUrlの決め方(必須の運用ルール)]
# -----------------------------------------------------------
#   1. クラウドワークスにログインした状態で案件検索を開く
#   2. キーワード・カテゴリ・契約方式(固定報酬/時間単価)などで実際に絞り込みを行う
#   3. 検索結果が表示された状態のページURLをそのままコピーして searchUrl に貼り付け
#   → keyword= だけの簡易URLではなく、必ずブラウザで実際に検索・絞り込みを
#     行った後の検索結果ページURLを設定してください。
#   ※ searchUrl 側で契約方式を絞り込んでいても、こちらの contractType は
#     予算判定(minBudget/minHourlyRate のどちらを使うか)のために別途必要です。
#     searchUrlの契約方式と contractType は必ず一致させてください。
#
# -----------------------------------------------------------
# [同じジャンルを複数条件に分けたいとき]
# -----------------------------------------------------------
#   「業務効率化(固定報酬)」「業務効率化(時間単価)」のように、
#   name を変えて2つのブロックを用意すればOKです(下記の例を参照)。
#
# -----------------------------------------------------------
# [追加・削除のやり方]
# -----------------------------------------------------------
#   searches: の下に、ブロックを増減させるだけでOKです。
#   ジャンルの塊ごとに # コメントで見出しを付けておくと、後からメンテしやすくなります。
#   起動時(pnpm run / pnpm run:headful)に形式チェックが入るので、
#   記述ミスがあれば実行前にエラーメッセージで教えてくれます。
#
# -----------------------------------------------------------
# [おすすめキーワードについて]
# -----------------------------------------------------------
#   「AIを活用した業務効率化ツール・Webツール開発・自動化案件」を狙う
#   前提でジャンルを用意しています。実際に検索してヒット件数や案件の質を
#   見ながら、キーワードの追加・削除・言い換え(例:「効率化」⇔「省力化」)を
#   調整していくのがおすすめです。取りこぼしを減らすには、同じ意図でも
#   表記ゆれ違いのキーワードを複数用意するのが効果的です。
#
#   ⚠ 下記の searchUrl はいずれも「実際に検索していない」プレースホルダーです。
#     運用開始前に、それぞれ対応するジャンル・契約方式でcrowdworks.jpで
#     検索・絞り込みを行った上でのURLに差し替えてください。

searches:
  # =========================================================
  # AI活用・業務効率化系
  # =========================================================
  - name: "業務効率化(固定報酬)"
    searchUrl: "https://crowdworks.jp/public/jobs/search?order=new&keyword=AI%E6%A5%AD%E5%8B%99%E5%8A%B9%E7%8E%87%E5%8C%96"
    contractType: fixed
    minBudget: 30000
    newOnly: false
    openOnly: true

  - name: "業務効率化(時間単価)"
    searchUrl: "https://crowdworks.jp/public/jobs/search?order=new&keyword=AI%E6%A5%AD%E5%8B%99%E5%8A%B9%E7%8E%87%E5%8C%96"
